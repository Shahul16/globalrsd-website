<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 190" width="160" height="190" role="img" aria-label="GIRSD crest: shield with open book, torch and globe">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8CC66"/>
      <stop offset="45%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#A5841C"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8CC66"/>
      <stop offset="100%" stop-color="#B08D1E"/>
    </linearGradient>
  </defs>

  <!-- Crown -->
  <g transform="translate(80,14)">
    <path d="M-16 6 L-13 -4 L-7 3 L0 -7 L7 3 L13 -4 L16 6 Z" fill="url(#goldV)" stroke="#A5841C" stroke-width="1"/>
    <rect x="-16" y="6" width="32" height="4" rx="1.5" fill="url(#gold)"/>
    <circle cx="-13" cy="-5" r="1.6" fill="#E8CC66"/>
    <circle cx="0" cy="-8" r="1.8" fill="#E8CC66"/>
    <circle cx="13" cy="-5" r="1.6" fill="#E8CC66"/>
  </g>

  <!-- Shield -->
  <path d="M80 26 L134 38 v44 c0 36 -25 56 -54 66 C51 138 26 118 26 82 V38 Z" fill="#14213D" stroke="url(#gold)" stroke-width="5"/>
  <path d="M80 34 L126 44 v38 c0 30 -21 47 -46 56 C55 129 34 112 34 82 V44 Z" fill="none" stroke="#C9A227" stroke-width="1.4" opacity="0.75"/>

  <!-- Panel dividers -->
  <line x1="80" y1="34" x2="80" y2="92" stroke="#C9A227" stroke-width="1.6"/>
  <path d="M34 88 L80 100 L126 88" fill="none" stroke="#C9A227" stroke-width="1.6"/>

  <!-- Open book (top-left panel) -->
  <g transform="translate(57,62)">
    <path d="M-15 0 c6 -4 11 -4 15 -1 c4 -3 9 -3 15 1 v13 c-6 -3 -11 -3 -15 0 c-4 -3 -9 -3 -15 0 Z" fill="url(#gold)"/>
    <line x1="0" y1="-1" x2="0" y2="13" stroke="#14213D" stroke-width="1.4"/>
    <path d="M-11 3 h8 M-11 6.5 h8 M3 3 h8 M3 6.5 h8" stroke="#14213D" stroke-width="0.9" opacity="0.65"/>
  </g>

  <!-- Torch (top-right panel) -->
  <g transform="translate(103,55)">
    <path d="M0 -8 q5 5 0 12 q-5 -7 0 -12" fill="#E8CC66"/>
    <path d="M0 -5 q3 3 0 7 q-3 -4 0 -7" fill="#C9A227"/>
    <path d="M-4 6 h8 l-2.6 18 h-2.8 Z" fill="url(#goldV)"/>
    <rect x="-5" y="4" width="10" height="3" rx="1.2" fill="url(#gold)"/>
  </g>

  <!-- Globe (bottom panel) -->
  <g transform="translate(80,116)">
    <circle r="16" fill="#0C1526" stroke="url(#gold)" stroke-width="2"/>
    <ellipse rx="7" ry="16" fill="none" stroke="#C9A227" stroke-width="0.9"/>
    <ellipse rx="13" ry="16" fill="none" stroke="#C9A227" stroke-width="0.7" opacity="0.7"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#C9A227" stroke-width="0.9"/>
    <path d="M-15 -6 h30 M-15 6 h30" stroke="#C9A227" stroke-width="0.7" opacity="0.7"/>
    <path d="M-9 -8 q4 -3 8 -1 q3 2 6 -1 q2 3 -1 5 q-4 2 -7 0 q-4 -1 -6 -4 M-4 4 q3 1 4 4 q-3 1 -5 -1 Z" fill="#C9A227" opacity="0.9"/>
  </g>

  <!-- Scrollwork flourishes -->
  <path d="M38 132 q-10 8 -4 16 q8 -2 10 -10 M122 132 q10 8 4 16 q-8 -2 -10 -10" fill="none" stroke="url(#gold)" stroke-width="2.4"/>
  <path d="M52 146 q-6 6 -2 11 M108 146 q6 6 2 11" fill="none" stroke="#C9A227" stroke-width="1.6" opacity="0.8"/>

  <!-- Banner -->
  <g>
    <path d="M20 158 l12 -6 v20 l-12 -5 Z" fill="#0C1526" stroke="#C9A227" stroke-width="1.2"/>
    <path d="M140 158 l-12 -6 v20 l12 -5 Z" fill="#0C1526" stroke="#C9A227" stroke-width="1.2"/>
    <path d="M32 152 h96 q4 8 0 20 h-96 q-4 -12 0 -20 Z" fill="#14213D" stroke="url(#gold)" stroke-width="2"/>
    <text x="80" y="167" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#C9A227" letter-spacing="5">GIRSD</text>
  </g>

  <!-- Fleur-de-lis finial -->
  <path d="M80 178 q-3 4 0 8 q3 -4 0 -8 M76 181 q-2 3 1 5 M84 181 q2 3 -1 5" fill="none" stroke="#C9A227" stroke-width="1.4"/>
</svg>
